###############################################################################
# Pipeline CI générique — commun aux deux applications (Angular ET Java/Gradle).
#
# Le MÊME fichier fonctionne dans les deux dépôts : une étape de détection
# identifie le type de projet, puis les étapes suivantes s'activent par
# condition (`if:`) selon ce type. Le script unifié run-tests.sh exécute les
# tests et produit un rapport JUnit XML, publié ensuite comme "check" GitHub.
###############################################################################
name: CI

on:
  push:
    branches: ["**"] # toutes les branches -> permet de tester sur une branche de dev
  pull_request:
    branches: [main]
  workflow_dispatch: # déclenchement manuel

# Permissions minimales (principe du moindre privilège).
# `checks: write` est requis pour publier le rapport de tests dans l'onglet Checks.
permissions:
  contents: read
  checks: write
  pull-requests: write
  packages: write # requis pour pousser l'image vers GitHub Container Registry

# Variables d'environnement centralisées : on adapte les versions ici sans
# toucher au reste du workflow.
env:
  NODE_VERSION: "20.19"
  JAVA_VERSION: "21"
  REGISTRY: ghcr.io # GitHub Container Registry

jobs:
  # ---------------------------------------------------------------------------
  # Job de test : s'adapte automatiquement au type de projet.
  # (Les jobs de build / release viendront s'ajouter dans les étapes suivantes ;
  #  on garde volontairement une structure en jobs distincts.)
  # ---------------------------------------------------------------------------
  test:
    name: Tests unitaires
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      # --- Détection du type de projet -------------------------------------
      - name: Détecter le type de projet
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
            echo "Projet Node/Angular détecté."
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "type=gradle" >> "$GITHUB_OUTPUT"
            echo "Projet Java/Gradle détecté."
          else
            echo "::error::Type de projet non reconnu (ni package.json ni Gradle)."
            exit 1
          fi

      # --- Chaîne Node / Angular (avec cache npm) --------------------------
      - name: Configurer Node.js
        if: steps.detect.outputs.type == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm # met en cache ~/.npm d'après package-lock.json

      - name: Installer les dépendances (npm ci)
        if: steps.detect.outputs.type == 'node'
        run: npm ci

      - name: Installer Chrome (pour Karma ChromeHeadless)
        if: steps.detect.outputs.type == 'node'
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      # --- Chaîne Java / Gradle (avec cache Gradle) ------------------------
      - name: Configurer le JDK
        if: steps.detect.outputs.type == 'gradle'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle # met en cache les dépendances Gradle

      # --- Exécution des tests via le script unifié ------------------------
      - name: Exécuter les tests unitaires
        env:
          # Indique à Karma où trouver Chrome (vide et ignoré pour un projet Gradle).
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: |
          chmod +x run-tests.sh
          ./run-tests.sh

      # --- Publication du rapport de tests dans GitHub ---------------------
      # `if: always()` : on publie le rapport même si des tests ont échoué.
      - name: Publier le rapport de tests (JUnit)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Rapport de tests unitaires
          path: test-results/**/*.xml
          reporter: java-junit # format JUnit XML standard (Karma & Gradle)
          fail-on-error: false

      # Conservation des rapports bruts comme artefact téléchargeable.
      - name: Archiver les rapports JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Job de build : construit l'image Docker, la valide (smoke test) puis la
  # pousse sur GitHub Container Registry, taguée `<branche>-<sha court>`.
  # Ne s'exécute que si le job de test a réussi (needs: test).
  # Générique : fonctionne pour tout dépôt disposant d'un Dockerfile à sa racine
  # (front Angular servi par Nginx comme back Java packagé en jar).
  # ---------------------------------------------------------------------------
  build:
    name: Build & push image Docker
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      # --- Détection du type de projet (même logique que le job `test`) -----
      # Détermine quel smoke test appliquer : une app Java a une dépendance
      # runtime (PostgreSQL), une app Angular servie par Nginx est autonome.
      - name: Détecter le type de projet
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
            echo "Projet Node/Angular détecté."
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "type=gradle" >> "$GITHUB_OUTPUT"
            echo "Projet Java/Gradle détecté."
          else
            echo "::error::Type de projet non reconnu (ni package.json ni Gradle)."
            exit 1
          fi

      # Configure Buildx (moteur de build moderne + cache).
      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Métadonnées d'image : nom (en minuscules) + tag lisible ----------
      - name: Préparer le nom et le tag de l'image
        id: meta
        run: |
          # GHCR exige un nom d'image entièrement en minuscules.
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          # Nom de branche assaini (les '/' de feature/x deviennent des '-').
          BRANCH="${GITHUB_REF_NAME//\//-}"
          SHA_SHORT="${GITHUB_SHA::7}"
          TAG="${BRANCH}-${SHA_SHORT}"
          echo "image=${IMAGE}"        >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"            >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}:${TAG}"   >> "$GITHUB_OUTPUT"
          echo "Image cible : ${IMAGE}:${TAG}"

      # --- Build local (chargé dans le démon pour le smoke test) ------------
      # push:false + load:true -> l'image reste locale, on la valide AVANT de
      # publier quoi que ce soit sur le registre.
      - name: Construire l'image (sans push)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: ${{ steps.meta.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Smoke test ADAPTATIF selon le type de projet ---------------------
      # Angular (Nginx) : autonome, aucune dépendance -> on vérifie simplement
      # que le conteneur démarre et reste vivant (détecte un crash au boot).
      - name: Smoke test de l'image (Angular)
        if: steps.detect.outputs.type == 'node'
        run: |
          set -euo pipefail
          docker run -d --name smoke-test "${{ steps.meta.outputs.ref }}"
          sleep 5
          if [ "$(docker inspect -f '{{.State.Running}}' smoke-test)" != "true" ]; then
            echo "::error::Le conteneur s'est arrêté prématurément."
            docker logs smoke-test
            exit 1
          fi
          echo "Conteneur opérationnel."

      # Java (Spring Boot) : dépendance runtime obligatoire à PostgreSQL.
      # On démarre une base éphémère sur un réseau Docker dédié, on branche
      # l'application dessus via SPRING_DATASOURCE_*, puis on attend que l'API
      # réponde réellement sur le port 8080 (un simple "reste vivant" ne suffit
      # pas : c'est le démarrage complet du contexte Spring qu'on valide).
      - name: Smoke test de l'image (Java + PostgreSQL)
        if: steps.detect.outputs.type == 'gradle'
        run: |
          set -euo pipefail
          docker network create smoke-net

          # Base de données éphémère (mêmes identifiants que docker-compose.yml)
          docker run -d --name smoke-db --network smoke-net \
            -e POSTGRES_USER=workshops_user \
            -e POSTGRES_PASSWORD=oc2024 \
            -e POSTGRES_DB=workshopsdb \
            postgres:13

          # Attendre que PostgreSQL accepte les connexions
          echo "Attente de PostgreSQL..."
          for i in $(seq 1 30); do
            if docker exec smoke-db pg_isready -U workshops_user -d workshopsdb >/dev/null 2>&1; then
              echo "PostgreSQL prêt."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::PostgreSQL n'a pas démarré à temps."
              docker logs smoke-db
              exit 1
            fi
            sleep 2
          done

          # Lancer l'application connectée à la base éphémère
          docker run -d --name smoke-test --network smoke-net -p 8080:8080 \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://smoke-db:5432/workshopsdb \
            -e SPRING_DATASOURCE_USERNAME=workshops_user \
            -e SPRING_DATASOURCE_PASSWORD=oc2024 \
            "${{ steps.meta.outputs.ref }}"

          # Attendre une réponse HTTP (n'importe quel code prouve que Tomcat et
          # le contexte Spring ont démarré). On échoue vite si le conteneur crashe.
          echo "Attente du démarrage de l'application..."
          for i in $(seq 1 40); do
            if [ "$(docker inspect -f '{{.State.Running}}' smoke-test)" != "true" ]; then
              echo "::error::Le conteneur applicatif s'est arrêté prématurément."
              docker logs smoke-test
              exit 1
            fi
            code="$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/ || echo 000)"
            if [ "$code" != "000" ]; then
              echo "Application opérationnelle (réponse HTTP $code)."
              break
            fi
            if [ "$i" -eq 40 ]; then
              echo "::error::L'application n'a pas répondu sur le port 8080 dans le délai imparti."
              docker logs smoke-test
              exit 1
            fi
            sleep 3
          done

      # Nettoyage systématique des ressources du smoke test (succès comme échec).
      - name: Nettoyer les ressources du smoke test
        if: always()
        run: |
          docker rm -f smoke-test smoke-db >/dev/null 2>&1 || true
          docker network rm smoke-net >/dev/null 2>&1 || true

      # --- Connexion à GHCR (uniquement hors pull_request) ------------------
      # On ne publie pas depuis une PR (le GITHUB_TOKEN d'une PR de fork n'a pas
      # les droits packages) : les PR se contentent de builder + tester l'image.
      - name: Se connecter à GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }} # secret injecté, jamais loggé

      # --- Push de l'image validée -----------------------------------------
      - name: Pousser l'image sur GHCR
        if: github.event_name != 'pull_request'
        run: docker push "${{ steps.meta.outputs.ref }}"

      - name: Récapitulatif
        if: github.event_name != 'pull_request'
        run: echo "Image publiée -> ${{ steps.meta.outputs.ref }}" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Job de release : versioning automatique via semantic-release (Conventional
  # Commits) -> release GitHub + CHANGELOG + bump de version dans les fichiers,
  # puis re-tag de l'image Docker déjà publiée avec la version sémantique.
  #
  # Déclenchement : uniquement sur un push/merge de la branche main (pas de
  # release depuis une PR ou une branche de dev).
  # ---------------------------------------------------------------------------
  release:
    name: Release & tag sémantique
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Permissions spécifiques au job (le moindre privilège ailleurs) :
    # semantic-release doit écrire tags/commit/release et republier l'image.
    permissions:
      contents: write # créer tags, release GitHub et pousser le commit de version
      issues: write # commenter les issues liées
      pull-requests: write # commenter les PR liées
      packages: write # re-taguer l'image sur GHCR

    steps:
      # fetch-depth: 0 -> semantic-release a besoin de tout l'historique + tags.
      - name: Récupérer le code (historique complet)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # --- Détection du type de projet (même logique que les autres jobs) ----
      # semantic-release est un outil Node, mais le DÉPÔT versionné peut être
      # Node (Angular) ou non (Java/Gradle). On adapte la configuration Node en
      # conséquence pour ne pas bloquer sur un cache/lockfile inexistant.
      - name: Détecter le type de projet
        id: detect
        run: |
          if [ -f package.json ]; then
            echo "type=node" >> "$GITHUB_OUTPUT"
            echo "Projet Node/Angular détecté."
          elif [ -f gradlew ] || [ -f build.gradle ] || [ -f build.gradle.kts ]; then
            echo "type=gradle" >> "$GITHUB_OUTPUT"
            echo "Projet Java/Gradle détecté."
          else
            echo "::error::Type de projet non reconnu (ni package.json ni Gradle)."
            exit 1
          fi

      # Cache npm UNIQUEMENT pour un vrai projet Node (présence d'un lockfile) :
      # sur un projet Gradle, `cache: npm` échouerait faute de package-lock.json.
      - name: Configurer Node.js (requis par semantic-release)
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ steps.detect.outputs.type == 'node' && 'npm' || '' }}

      # --- Installation ADAPTATIVE de la chaîne semantic-release -------------
      # Node   : semantic-release et ses plugins sont des devDependencies -> npm ci.
      # Gradle : aucun package.json -> on installe la chaîne à la volée, sans
      #          polluer le dépôt (--no-save).
      - name: Installer la chaîne de release
        run: |
          set -euo pipefail
          if [ "${{ steps.detect.outputs.type }}" = "node" ]; then
            npm ci
          else
            npm install --no-save \
              semantic-release \
              @semantic-release/commit-analyzer \
              @semantic-release/release-notes-generator \
              @semantic-release/changelog \
              @semantic-release/exec \
              @semantic-release/git \
              @semantic-release/github
          fi

      # semantic-release analyse les commits, calcule la version, crée la
      # release GitHub + CHANGELOG et — via le plugin exec — expose la version
      # calculée dans la sortie d'étape `version`.
      #
      # Config ADAPTATIVE :
      #  - Node   : on utilise la config du dépôt (.releaserc / clé "release"),
      #             qui gère le bump de package.json + CHANGELOG.
      #  - Gradle : le dépôt n'embarque pas de config de release -> on en génère
      #             une par défaut. Elle bump `version` dans build.gradle (via
      #             exec/prepareCmd), génère le CHANGELOG.md, committe les deux
      #             en retour (plugin git) et émet la version pour le re-tag.
      - name: Lancer semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # secret injecté, jamais loggé
        run: |
          set -euo pipefail
          has_config=false
          for f in .releaserc .releaserc.json .releaserc.yaml .releaserc.yml .releaserc.js .releaserc.cjs release.config.js release.config.cjs; do
            [ -f "$f" ] && has_config=true && break
          done
          if [ "$has_config" = false ] && grep -q '"release"' package.json 2>/dev/null; then
            has_config=true
          fi

          if [ "$has_config" = false ]; then
            echo "Aucune config de release dans le dépôt : génération d'une config par défaut."
            cat > .releaserc.json <<'EOF'
          {
            "branches": ["main"],
            "plugins": [
              "@semantic-release/commit-analyzer",
              "@semantic-release/release-notes-generator",
              "@semantic-release/changelog",
              ["@semantic-release/exec", {
                "verifyReleaseCmd": "echo \"version=${nextRelease.version}\" >> \"$GITHUB_OUTPUT\"",
                "prepareCmd": "sed -i -E \"s/^version = .*/version = '${nextRelease.version}'/\" build.gradle"
              }],
              ["@semantic-release/git", {
                "assets": ["build.gradle", "CHANGELOG.md"],
                "message": "chore(release): ${nextRelease.version} [skip ci]\n\n${nextRelease.notes}"
              }],
              "@semantic-release/github"
            ]
          }
          EOF
          fi

          npx semantic-release

      # --- Re-tag de l'image Docker avec la version sémantique --------------
      # Seulement si une nouvelle version a été publiée (sortie non vide).
      - name: Se connecter à GitHub Container Registry
        if: steps.semantic.outputs.version != ''
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # On ne reconstruit pas : on ajoute les tags `x.y.z` et `latest` sur
      # l'image exacte déjà buildée et testée par le job `build` (main-<sha>).
      - name: Taguer l'image avec la version sémantique
        if: steps.semantic.outputs.version != ''
        run: |
          set -euo pipefail
          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          SOURCE="${IMAGE}:main-${GITHUB_SHA::7}"
          VERSION="${{ steps.semantic.outputs.version }}"
          docker buildx imagetools create "$SOURCE" \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest"
          echo "Image taguée -> ${IMAGE}:${VERSION} (+ latest)" >> "$GITHUB_STEP_SUMMARY"
